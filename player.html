<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Player Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="forum-wrapper">
    <div class="header">
        <div class="header-left">
            <img src="assets/server-icon.png" class="logo" alt="Logo">
            <h1>Beta 1.7.3 Wiki</h1>
        </div>
        <div class="global-search-container">
            <input type="text" id="globalSearch" placeholder="Search..." onkeyup="globalSearch()">
            <div id="searchResults"></div>
        </div>
    </div>
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="directory.html">Directory</a>
        <a href="atlas-map.html">Atlas</a>
        <a href="submit.html">Submit</a>
    </div>
    <div class="content" id="profileContent" style="display:none;">
        <div style="display: flex; gap: 30px;">
            <div style="flex: 0 0 300px;">
                <img id="pImg" style="width: 100%; border: 2px solid #555; image-rendering: pixelated; background: #111;">
                <button id="editBtn" class="pan-button" style="width: 100%; margin-top: 15px;">Edit Profile</button>
            </div>
            <div style="flex-grow: 1;">
                <h1 style="color: #55aaff; margin-top: 0; display: flex; align-items: center;">
                    <span id="pName"></span> <span id="pOnlineStatus"></span>
                </h1>
                <p id="pStats" style="font-weight: bold; color: #777;"></p>
                <div class="board-header">Biography</div>
                <p id="pDesc" style="line-height: 1.6; background: #262626; padding: 20px; border: 1px solid #444; margin-bottom: 20px;"></p>
                <div class="board-header">Builds</div>
                <div id="builds"></div>
            </div>
        </div>
    </div>
</div>
<script src="locations.js"></script>
<script>
window.renderPage = function() {
    const id = new URLSearchParams(window.location.search).get('id');
    const player = serverPlayers.find(p => p.id === id);
    if (!player) return;
    
    document.getElementById('profileContent').style.display = 'block';
    document.getElementById('pName').innerText = player.name;
    document.getElementById('pImg').src = player.image;
    document.getElementById('pDesc').innerText = player.description;
    
    // Online Badge
    const isOnline = onlinePlayers.includes(player.name.toLowerCase());
    document.getElementById('pOnlineStatus').innerHTML = isOnline ? 
        `<span class="status-badge status-online">🟢 Online in-game</span>` : 
        `<span class="status-badge status-offline">🔴 Offline</span>`;
        
    // Faction link
    const g = serverGroups.find(x => x.name === player.group);
    const groupLink = g ? `<a href="group.html?id=${g.id}" style="color:#55aaff;">${g.name}</a>` : "None";
    document.getElementById('pStats').innerHTML = `Joined: ${player.joinDate} | Group: ${groupLink}`;
    
    // Builds link
    const b = serverLocations.filter(l => l.ownerPlayer === player.name);
    document.getElementById('builds').innerHTML = b.map(item => `
        <div class="board-item">
            <div class="loc-thumb" style="width: 48px; height: 48px; background-image: url('${item.image}')"></div>
            <div class="board-info">
                <h2 style="margin-top:10px;"><a href="location.html?id=${item.id}">${item.name}</a></h2>
            </div>
        </div>
    `).join('') || "<p>No builds documented.</p>";
    
    document.getElementById('editBtn').onclick = () => location.href = `submit.html?type=player&edit=${player.id}`;
};
</script>
</body>
</html>
