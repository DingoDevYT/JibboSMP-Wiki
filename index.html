<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Server Wiki - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="forum-wrapper">
    <!-- Insert Header/Navbar Here -->
    <div class="content">
        <div style="background: #262626; padding: 20px; border: 1px solid #444; margin-bottom: 25px;">
            <h2 style="margin-top: 0; color: #55aaff;">Server Bulletin</h2>
            <p>Welcome to the community archive for the Beta 1.7.3 SMP. Use the Directory to browse players and factions.</p>
        </div>
        <div class="board-header">Recent Approved Builds</div>
        <div id="latestBuilds"></div>
    </div>
</div>
<script src="locations.js"></script>
<script>
window.renderPage = function() {
    document.getElementById('latestBuilds').innerHTML = serverLocations.slice(-5).reverse().map(loc => `
        <div class="board-item">
            <div class="loc-thumb" style="background-image: url('${loc.image}')"></div>
            <div class="board-info">
                <h2><a href="location.html?id=${loc.id}">${loc.name}</a></h2>
                <p>${loc.description.substring(0, 150)}...</p>
            </div>
        </div>
    `).join('');
};
</script>
</body>
</html>
