<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jibbo's Beta 1.7.3 MC</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="forum-wrapper">
    <div class="header">
        <img src="assets/server-icon.png" alt="Logo" class="logo">
        <h1>Server Wiki</h1>
    </div>
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="atlas-map.html">Atlas</a>
        <a href="submit.html">Submit</a>
    </div>
    <div class="content">
        <h3 style="color: #fff; border-bottom: 1px solid #444;">Recently Approved Builds</h3>
        <ul id="latestAdditionsList" class="board-list"></ul>
    </div>
</div>
<script src="locations.js"></script>
<script>
function renderLatestAdditions() {
    const list = document.getElementById('latestAdditionsList');
    list.innerHTML = serverLocations.slice(-5).reverse().map(loc => `
        <li class="board-item">
            <div class="loc-thumb" style="background-image: url('${loc.image}')"></div>
            <div class="board-info">
                <h2><a href="location.html?id=${loc.id}">${loc.name}</a></h2>
                <p>${loc.description.substring(0, 100)}...</p>
            </div>
        </li>
    `).join('');
}
</script>
</body>
</html>
