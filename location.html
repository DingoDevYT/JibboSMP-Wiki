<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Details - Server Wiki</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="forum-wrapper">
    <!-- Global Header with Search -->
    <div class="header">
        <div class="header-left">
            <img src="assets/server-icon.png" class="logo" alt="Server Icon">
            <h1>Beta 1.7.3 Server Wiki</h1>
        </div>
        <div class="global-search-container">
            <input type="text" id="globalSearch" placeholder="Search Wiki..." onkeyup="globalSearch()">
            <div id="searchResults"></div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="directory.html">Directory</a>
        <a href="atlas-map.html">Interactive Atlas</a>
        <a href="submit.html">Submit</a>
    </div>

    <div class="content" id="profileContent" style="display:none;">
        <div style="display: flex; gap: 30px;">
            <!-- Left Sidebar -->
            <div style="flex: 0 0 400px;">
                <img id="locImage" style="width: 100%; border: 2px solid #555; image-rendering: pixelated; box-shadow: 4px 4px 0px #000;">
                
                <div style="background: #1e1e1e; padding: 15px; margin-top: 15px; border: 1px solid #444;">
                    <div class="board-header" style="margin: -15px -15px 10px -15px; border: none;">Quick Stats</div>
                    <p style="margin: 5px 0;"><strong>Coordinates:</strong> <span id="locCoords" style="font-family: monospace; color: #55aaff;"></span></p>
                    <p style="margin: 5px 0;"><strong>Built:</strong> <span id="buildDate"></span></p>
                    <p id="ownerLink" style="margin: 10px 0 0 0; border-top: 1px solid #333; padding-top: 10px; font-weight: bold;"></p>
                </div>

                <button id="editBtn" class="pan-button" style="width: 100%; margin-top: 15px; font-size: 14px;">Edit This Page</button>
            </div>

            <!-- Right Content -->
            <div style="flex-grow: 1;">
                <h1 id="locTitle" style="color: #55aaff; margin-top: 0; font-size: 28px; text-shadow: 2px 2px #000; border-bottom: 2px solid #444; padding-bottom: 10px;"></h1>
                
                <div class="board-header">Description & History</div>
                <p id="locDesc" style="line-height: 1.6; font-size: 14px; background: #262626; padding: 20px; border: 1px solid #444;"></p>
                
                <button id="mapJumpBtn" class="pan-button" style="margin-top: 20px;">View on Interactive Atlas</button>
            </div>
        </div>
    </div>

    <!-- Error State -->
    <div class="content" id="errorContent" style="display:none; text-align: center; padding: 100px 0;">
        <h1 style="color: #ff5555;">Location Not Found</h1>
        <p>The ID provided does not match any approved entries in the database.</p>
        <a href="directory.html" class="pan-button" style="display: inline-block; margin-top: 20px; text-decoration: none;">Back to Directory</a>
    </div>
</div>

<script src="locations.js"></script>
<script>
window.renderPage = function() {
    const id = new URLSearchParams(window.location.search).get('id');
    const loc = serverLocations.find(l => l.id === id);

    if (loc) {
        document.getElementById('profileContent').style.display = 'block';
        document.getElementById('locTitle').innerText = loc.name;
        document.getElementById('locImage').src = loc.image;
        document.getElementById('locDesc').innerText = loc.description;
        document.getElementById('locCoords').innerText = `${loc.x}, ${loc.y}, ${loc.z}`;
        document.getElementById('buildDate').innerText = loc.buildDate || "Unknown";

        // Auto-linking Logic[cite: 7]
        let linkHtml = "Built By: ";
        const p = serverPlayers.find(x => x.name.toLowerCase() === loc.ownerPlayer.toLowerCase());
        const g = serverGroups.find(x => x.name.toLowerCase() === loc.ownerGroup.toLowerCase());
        
        if (p) {
            linkHtml += `<a href="player.html?id=${p.id}" style="color:#55aaff; text-decoration: underline;">${p.name}</a>`;
        } else if (g) {
            linkHtml += `<a href="group.html?id=${g.id}" style="color:#55aaff; text-decoration: underline;">${g.name}</a>`;
        } else {
            linkHtml += (loc.ownerPlayer !== "N/A" ? loc.ownerPlayer : (loc.ownerGroup !== "N/A" ? loc.ownerGroup : "Community"));
        }
        
        document.getElementById('ownerLink').innerHTML = linkHtml;

        // Button Actions
        document.getElementById('editBtn').onclick = () => {
            location.href = `submit.html?type=location&edit=${loc.id}`;
        };
        document.getElementById('mapJumpBtn').onclick = () => {
            location.href = `atlas-map.html?x=${loc.x}&y=${loc.y}&z=${loc.z}`;
        };
    } else {
        document.getElementById('errorContent').style.display = 'block';
    }
};
</script>
</body>
</html>
