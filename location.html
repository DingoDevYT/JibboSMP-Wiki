<!-- The top half of location.html remains exactly the same, just update the script at the bottom: -->

<script src="locations.js"></script>
<script>
function renderLocationDetails() {
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id');

    const locationData = serverLocations.find(loc => loc.id === targetId);

    if (locationData) {
        document.getElementById('locationContent').style.display = 'block';
        
        document.title = locationData.name + " - Server Wiki";
        document.getElementById('locTitle').innerText = locationData.name;
        
        // Handle whether the image is a direct URL (Imgur) or local asset
        const imgUrl = locationData.image.startsWith('http') ? locationData.image : "assets/" + locationData.image;
        document.getElementById('locImage').src = imgUrl;
        
        // Include the new data fields
        let builderInfo = locationData.ownerPlayer !== 'N/A' ? locationData.ownerPlayer : locationData.ownerGroup;
        
        document.getElementById('locCoords').innerHTML = `
            X: ${locationData.x} | Y: ${locationData.y} | Z: ${locationData.z}<br>
            <span style="color:#777; font-size:12px; display:block; margin-top:5px;">Built By: ${builderInfo} | Date: ${locationData.buildDate}</span>
        `;
        
        document.getElementById('locDesc').innerText = locationData.description;
        
        document.getElementById('mapButton').onclick = function() {
            window.location.href = `atlas-map.html?x=${locationData.x}&y=${locationData.y}&z=${locationData.z}`;
        };
    } else {
        document.getElementById('errorContent').style.display = 'block';
    }
}
</script>
