<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Details</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="forum-wrapper">
    <div class="header">
        <img src="assets/server-icon.png" alt="Server Icon" class="logo">
        <h1>Beta 1.7.3 Server Wiki</h1>
    </div>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="atlas-map.html">Interactive Atlas</a>
        <a href="submit.html">Submit Location</a>
    </div>

    <div class="content" id="loadingContent">
        <p style="color: #cccccc; text-align: center; padding: 50px;">Loading database...</p>
    </div>

    <div class="content" id="locationContent" style="display: none;">
        <div style="background-color: #262626; border: 1px solid #444444; padding: 20px; margin-bottom: 20px;">
            <h2 id="locTitle" style="margin-top: 0; color: #55aaff; border-bottom: 1px solid #444444; padding-bottom: 10px;"></h2>
            
            <div style="display: flex; gap: 20px; margin-top: 15px;">
                <div style="flex: 0 0 400px;">
                    <img id="locImage" src="" alt="Location Screenshot" style="width: 100%; border: 2px solid #1e1e1e; image-rendering: pixelated;">
                    <div style="background-color: #1e1e1e; border: 1px solid #444444; padding: 10px; margin-top: 10px;">
                        <p id="locCoords" style="margin: 0; color: #999999; font-family: monospace; font-size: 14px;"></p>
                    </div>
                    <button class="pan-button" id="mapButton" style="width: 100%; margin-top: 10px; padding: 10px;">View on Interactive Map</button>
                </div>
                <div style="flex-grow: 1;">
                    <h3 style="color: #ffffff; margin-top: 0;">Description</h3>
                    <p id="locDesc" style="color: #cccccc; line-height: 1.6;"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="content" id="errorContent" style="display: none;">
        <h2 style="color: #ff5555;">Location Not Found</h2>
        <p id="errorReason" style="color: #cccccc;"></p>
        <a href="atlas-map.html" style="color: #55aaff;">Return to the Atlas</a>
    </div>
</div>

<script src="locations.js"></script>
<script>
function renderLocationDetails() {
    document.getElementById('loadingContent').style.display = 'none';
    const urlParams = new URLSearchParams(window.location.search);
    let targetId = urlParams.get('id');

    if (!targetId) {
        document.getElementById('errorContent').style.display = 'block';
        document.getElementById('errorReason').innerText = "No ID provided.";
        return;
    }

    const loc = serverLocations.find(l => l.id.toLowerCase().trim() === targetId.toLowerCase().trim());

    if (loc) {
        document.getElementById('locationContent').style.display = 'block';
        document.getElementById('locTitle').innerText = loc.name;
        document.getElementById('locImage').src = loc.image.startsWith('http') ? loc.image : "assets/" + loc.image;
        document.getElementById('locCoords').innerHTML = `X: ${loc.x} | Y: ${loc.y} | Z: ${loc.z}<br>By: ${loc.ownerPlayer} | ${loc.buildDate}`;
        document.getElementById('locDesc').innerText = loc.description;
        document.getElementById('mapButton').onclick = () => window.location.href = `atlas-map.html?x=${loc.x}&y=${loc.y}&z=${loc.z}`;
    } else {
        document.getElementById('errorContent').style.display = 'block';
        document.getElementById('errorReason').innerText = "Could not find " + targetId;
    }
}
</script>
</body>
</html>
