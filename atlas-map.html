<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Interactive Atlas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="forum-wrapper">
    <div class="header"><img src="assets/server-icon.png" class="logo"><h1>Interactive Atlas</h1></div>
    <div class="navbar"><a href="index.html">Home</a> <a href="atlas-map.html">Atlas</a> <a href="submit.html">Submit</a></div>
    <div class="content">
        <div class="search-container"><input type="text" id="searchBar" placeholder="Search buildings..." onkeyup="filterLocations()"></div>
        <div class="split-container">
            <div class="sidebar"><ul id="locationList" class="board-list"></ul></div>
            <div class="map-wrapper"><iframe id="mapIframe" src="https://dynmap-proxy.landonian2006.workers.dev/#"></iframe></div>
        </div>
    </div>
</div>
<script src="locations.js"></script>
<script>
function renderLocations() {
    document.getElementById('locationList').innerHTML = serverLocations.map(loc => `
        <li class="board-item" id="sidebar-${loc.id}">
            <div class="loc-thumb" style="background-image: url('${loc.image}')"></div>
            <div class="board-info">
                <h2><a href="location.html?id=${loc.id}">${loc.name}</a></h2>
                <button class="pan-button" onclick="panMap(${loc.x}, ${loc.y}, ${loc.z}, '${loc.id}')">View</button>
            </div>
        </li>
    `).join('');
    const p = new URLSearchParams(window.location.search);
    if(p.get('x')) panMap(p.get('x'), p.get('y'), p.get('z'));
}
function panMap(x, y, z, id) {
    document.getElementById('mapIframe').src = `https://dynmap-proxy.landonian2006.workers.dev/?x=${x}&y=${y}&z=${z}&zoom=6`;
    document.querySelectorAll('.board-item').forEach(el => el.classList.remove('selected-location'));
    if(id) document.getElementById('sidebar-' + id)?.classList.add('selected-location');
}
function filterLocations() {
    const q = document.getElementById('searchBar').value.toUpperCase();
    document.querySelectorAll('#locationList li').forEach(li => {
        li.style.display = li.innerText.toUpperCase().includes(q) ? "" : "none";
    });
}
</script>
</body>
</html>
