<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Atlas & Map</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="forum-wrapper">
    <div class="header">
        <img src="assets/server-icon.png" alt="Server Icon" class="logo">
        <h1>Beta 1.7.3 Interactive Atlas</h1>
    </div>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="atlas-map.html">Atlas & Map</a>
        <a href="submit.html">Submit Location</a>
    </div>

    <div class="content">
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search locations..." onkeyup="filterLocations()">
        </div>

        <div class="split-container">
            <div class="sidebar">
                <ul id="locationList" class="board-list">
                    <li class="board-item" style="color: #999999;">Loading database...</li>
                </ul>
            </div>
            
            <div class="map-frame-container" style="display: flex; flex-direction: column;">
                <div style="background-color: #802020; color: white; padding: 10px; font-size: 12px; text-align: center; border-bottom: 1px solid #444444;">
                    If the map is blank, your browser or proxy is blocking it. <a href="http://51.81.142.14:8021/#" target="_blank" style="color: #ffcc00; font-weight: bold; text-decoration: underline;">Click here to open the live map safely in a new tab.</a>
                </div>
                <!-- Updated iframe source to use your specific Cloudflare Worker -->
                <iframe id="mapIframe" src="https://dynmap-proxy.landonian2006.workers.dev/#" allowfullscreen style="flex-grow: 1;"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
let mapIframe;
let locationListElement;

function renderLocations() {
    locationListElement = document.getElementById('locationList');
    locationListElement.innerHTML = '';
    
    serverLocations.forEach(loc => {
        const li = document.createElement('li');
        li.className = 'board-item interactive-item';
        
        let previewDesc = loc.description.substring(0, 60);
        if (loc.description.length > 60) previewDesc += '...';

        li.innerHTML = `
            <div class="icon-placeholder"></div>
            <div class="board-info">
                <h2><a href="location.html?id=${loc.id}">${loc.name}</a></h2>
                <p>${previewDesc}</p>
                <button class="pan-button" onclick="panMap(${loc.x}, ${loc.y}, ${loc.z})">View on Map</button>
            </div>
        `;
        locationListElement.appendChild(li);
    });
}

function panMap(x, y, z) {
    mapIframe = document.getElementById('mapIframe');
    const zoomLevel = 6;
    // Updated pan function to push coordinates through your Cloudflare proxy
    mapIframe.src = `https://dynmap-proxy.landonian2006.workers.dev/?x=${x}&y=${y}&z=${z}&zoom=${zoomLevel}`;
}

function filterLocations() {
    const input = document.getElementById('searchBar').value.toUpperCase();
    const items = locationListElement.getElementsByTagName('li');

    for (let i = 0; i < items.length; i++) {
        let h2 = items[i].getElementsByTagName("h2")[0];
        let txtValue = h2.textContent || h2.innerText;
        
        if (txtValue.toUpperCase().indexOf(input) > -1) {
            items[i].style.display = "";
        } else {
            items[i].style.display = "none";
        }
    }
}

function checkUrlForCoords() {
    const urlParams = new URLSearchParams(window.location.search);
    const mapX = urlParams.get('x');
    const mapY = urlParams.get('y');
    const mapZ = urlParams.get('z');
    
    if (mapX !== null && mapY !== null && mapZ !== null) {
        panMap(mapX, mapY, mapZ);
    }
}
</script>
<script src="locations.js"></script>
<script>
window.onload = function() {
    checkUrlForCoords();
};
</script>
</body>
</html>
