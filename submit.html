<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit - Server Wiki</title>
<link rel="stylesheet" href="style.css">
<style>
    .tab-container { display: flex; gap: 5px; margin-bottom: -2px; }
    .tab { padding: 10px 20px; background: #262626; border: 2px solid #555; border-bottom: none; cursor: pointer; color: #777; }
    .tab.active { background: #4a5d23; color: white; border-color: #555; }
    .form-section { display: none; background: #262626; border: 2px solid #555; padding: 20px; }
    .form-section.active { display: block; }
</style>
</head>
<body>

<div class="forum-wrapper">
    <div class="header">
        <img src="assets/server-icon.png" alt="Logo" class="logo">
        <h1 id="pageTitle">Submit to Wiki</h1>
    </div>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="atlas-map.html">Atlas</a>
        <a href="submit.html">Submit</a>
    </div>

    <div class="content">
        <div class="tab-container">
            <div class="tab active" onclick="switchTab('location')">Location</div>
            <div class="tab" onclick="switchTab('player')">Player</div>
            <div class="tab" onclick="switchTab('group')">Group</div>
        </div>

        <div id="location" class="form-section active">
            <form id="form-location">
                <input type="hidden" name="entry_type" value="location">
                <label>Location Name: <input type="text" name="location_name" required></label>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <label>Owner (Player): <input type="text" name="owned_by_player" list="playerList"></label>
                    <label>Owner (Group): <input type="text" name="owned_by_group" list="groupList"></label>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <label>X: <input type="number" name="coord_x" required></label>
                    <label>Y: <input type="number" name="coord_y" required></label>
                    <label>Z: <input type="number" name="coord_z" required></label>
                </div>
                <label>Build Date: <input type="text" name="build_date"></label>
                <label>Image URL: <input type="url" name="image_link" required></label>
                <label>Description: <textarea name="description" rows="5" required></textarea></label>
                <button type="submit" class="pan-button">Submit Location</button>
            </form>
        </div>

        <!-- Player & Group Sections follow same pattern... -->
    </div>
</div>

<datalist id="playerList"></datalist>
<datalist id="groupList"></datalist>

<script src="locations.js"></script>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxmma5LHgkTA__mCV2pzYJ-xIVYZOLQiTlzrRkCj0b0VVGSpIa2rZ24wJ2v3xaMJpmd/exec';

    function switchTab(type) {
        document.querySelectorAll('.tab, .form-section').forEach(el => el.classList.remove('active'));
        document.querySelector(`.tab[onclick="switchTab('${type}')"]`).classList.add('active');
        document.getElementById(type).classList.add('active');
    }

    function populateDropdowns() {
        const pList = document.getElementById('playerList');
        const gList = document.getElementById('groupList');
        pList.innerHTML = serverPlayers.map(p => `<option value="${p.name}">`).join('');
        gList.innerHTML = serverGroups.map(g => `<option value="${g.name}">`).join('');
    }

    function checkEditMode() {
        const params = new URLSearchParams(window.location.search);
        const editId = params.get('edit');
        if (editId) {
            const data = serverLocations.find(l => l.id === editId);
            if (data) {
                document.getElementById('pageTitle').innerText = "Editing: " + data.name;
                const f = document.getElementById('form-location');
                f.location_name.value = data.name;
                f.owned_by_player.value = data.ownerPlayer;
                f.owned_by_group.value = data.ownerGroup;
                f.coord_x.value = data.x; f.coord_y.value = data.y; f.coord_z.value = data.z;
                f.build_date.value = data.buildDate;
                f.image_link.value = data.image;
                f.description.value = data.description;
            }
        }
    }

    document.querySelectorAll('form').forEach(form => {
        form.addEventListener('submit', e => {
            e.preventDefault();
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(() => alert("Submitted for approval!"))
            .catch(err => console.error(err));
        });
    });
</script>
</body>
</html>
